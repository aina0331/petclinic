{% extends "base.html" %}
{% block title %}{{ 'Edit' if client else 'New' }} Client{% endblock %}
{% block content %}
<div class="page-header-row">
  <h2>{{ 'Edit Client' if client else 'Add New Client' }}</h2>
  <a href="{{ url_for('clients') }}" class="btn btn-ghost">← Back</a>
</div>
<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" name="first_name" required value="{{ client.first_name if client else '' }}">
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" name="last_name" required value="{{ client.last_name if client else '' }}">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" name="email" required value="{{ client.email if client else '' }}">
        </div>
        <div class="form-group">
          <label>Contact Number *</label>
          <input type="text" name="contact_number" required value="{{ client.contact_number if client else '' }}">
        </div>
        <div class="form-group full">
          <label>Address</label>
          <input type="text" name="address" value="{{ client.address if client else '' }}">
        </div>
      </div>
      <div style="margin-top:20px;display:flex;gap:10px">
        <button type="submit" class="btn btn-primary">{{ 'Save Changes' if client else 'Add Client' }}</button>
        <a href="{{ url_for('clients') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
